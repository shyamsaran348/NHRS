version: '3.8'

services:
  # --------------------------------------------------------
  # DATABASE LAYER (PostgreSQL 15)
  # --------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: nhrs_database
    environment:
      POSTGRES_DB: gov_highway_tenders
      POSTGRES_USER: shyam
      POSTGRES_PASSWORD: NHRS_secure_database_password_9824
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - nhrs_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shyam -d gov_highway_tenders"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # BACKEND SERVICE LAYER (FastAPI)
  # --------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nhrs_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://shyam:NHRS_secure_database_password_9824@db:5432/gov_highway_tenders
      - SECRET_KEY=NHRS_SECRET_KEY_FOR_JWT_SECURE_TOKEN_5849302
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
      - CORS_ORIGINS=http://localhost,http://127.0.0.1,http://localhost:80,http://localhost:5173
    ports:
      - "8000:8000"
    networks:
      - nhrs_network
    depends_on:
      db:
        condition: service_healthy

  # --------------------------------------------------------
  # FRONTEND WEB LAYER (Nginx + Compiled React static assets)
  # --------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nhrs_frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - nhrs_network
    depends_on:
      - backend

# Persistent Volume Storage for audit backups
volumes:
  postgres_data:
    driver: local

# Closed Private Government Networking Bridge
networks:
  nhrs_network:
    driver: bridge
